name: Win10_Woo_Packer

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4 # 升级到 v4

      - name: 安装 Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.10'

      - name: 安装必要工具
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4 pyinstaller lxml

      - name: 开始打包成EXE
        run: |
          pyinstaller --onefile --clean --name="Woo进货采集器" main.py

      - name: 导出结果
        uses: actions/upload-artifact@v4 # 关键：必须是 v4 才能运行
        with:
          name: My_Windows_Tool
          path: dist/*.exe
